<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>위시풀스테이 AI 직원</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f5f4f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── 비밀번호 화면 ── */
    #pw-screen {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      width: 340px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    #pw-screen .logo {
      font-size: 32px;
      margin-bottom: 8px;
    }
    #pw-screen h1 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    #pw-screen p {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }
    #pw-screen input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    #pw-screen input:focus { border-color: #4a7c6b; }
    #pw-screen button {
      width: 100%;
      padding: 13px;
      background: #4a7c6b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #pw-screen button:hover { background: #3d6b5c; }
    #pw-error {
      color: #e05252;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ── 챗 화면 ── */
    #chat-screen {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      background: #fff;
    }

    /* 헤더 */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      background: #fff;
    }
    .chat-header .avatar {
      width: 36px;
      height: 36px;
      background: #4a7c6b;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .chat-header .info h2 {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .chat-header .info p {
      font-size: 12px;
      color: #4a7c6b;
    }
    .btn-refresh {
      margin-left: auto;
      background: none;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-refresh:hover { border-color: #4a7c6b; color: #4a7c6b; }

    /* 메시지 영역 */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      display: flex;
      gap: 8px;
      max-width: 85%;
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .msg .bubble {
      padding: 11px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #4a7c6b;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #f0f0ee;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
    }

    .msg .bot-icon {
      width: 30px;
      height: 30px;
      background: #4a7c6b;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    /* 타이핑 인디케이터 */
    .typing-dots span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #aaa;
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* 입력 영역 */
    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 8px;
      background: #fff;
    }
    .chat-input-area textarea {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }
    .chat-input-area textarea:focus { border-color: #4a7c6b; }
    .chat-input-area button {
      width: 44px;
      height: 44px;
      background: #4a7c6b;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background 0.2s;
    }
    .chat-input-area button:hover { background: #3d6b5c; }
    .chat-input-area button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ── 비밀번호 화면 ── -->
<div id="pw-screen">
  <div class="logo">🏨</div>
  <h1>위시풀스테이 AI 직원</h1>
  <p>직원 전용 시스템입니다</p>
  <input type="password" id="pw-input" placeholder="비밀번호 입력" />
  <button onclick="login()">입장</button>
  <div id="pw-error">비밀번호가 올바르지 않습니다.</div>
</div>

<!-- ── 챗 화면 ── -->
<div id="chat-screen">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h2>위시풀스테이 AI 직원</h2>
      <p>● 운영 중</p>
    </div>
    <button class="btn-refresh" onclick="refreshDocs()">🔄 문서 갱신</button>
  </div>

  <div id="messages">
    <!-- 초기 메시지 -->
    <div class="msg bot">
      <div class="bot-icon">🤖</div>
      <div class="bubble">안녕하세요! 위시풀스테이 AI 직원입니다 😊<br>운영 매뉴얼 관련 궁금한 점을 질문해주세요.</div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="user-input" placeholder="질문을 입력하세요..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  let password = '';
  let chatHistory = [];

  // 비밀번호 입력 시 엔터
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const input = document.getElementById('pw-input').value.trim();
    if (!input) return;

    // 임시 검증: 서버에 빈 메시지로 비밀번호만 확인
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: '안녕', password: input, history: [] })
      });
      if (res.status === 401) {
        document.getElementById('pw-error').style.display = 'block';
        return;
      }
      // 성공
      password = input;
      document.getElementById('pw-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('user-input').focus();
    } catch (e) {
      document.getElementById('pw-error').style.display = 'block';
    }
  }

  async function sendMessage() {
    const textarea = document.getElementById('user-input');
    const text = textarea.value.trim();
    if (!text) return;

    // UI 초기화
    textarea.value = '';
    textarea.style.height = 'auto';
    document.getElementById('send-btn').disabled = true;

    // 사용자 메시지 추가
    addMessage('user', text);

    // 타이핑 인디케이터
    const typingEl = addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, password, history: chatHistory })
      });

      typingEl.remove();

      if (!res.ok) {
        const err = await res.json();
        addMessage('bot', `⚠️ ${err.error || '오류가 발생했습니다.'}`);
      } else {
        const data = await res.json();
        addMessage('bot', data.reply);
        chatHistory.push({ role: 'user', content: text });
        chatHistory.push({ role: 'assistant', content: data.reply });
        if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);
      }
    } catch (e) {
      typingEl.remove();
      addMessage('bot', '⚠️ 서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.');
    }

    document.getElementById('send-btn').disabled = false;
    document.getElementById('user-input').focus();
  }

  function addMessage(role, text) {
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    if (role === 'bot') {
      div.innerHTML = `<div class="bot-icon">🤖</div><div class="bubble">${escapeHtml(text)}</div>`;
    } else {
      div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    }
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping() {
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="bot-icon">🤖</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  async function refreshDocs() {
    const btn = document.querySelector('.btn-refresh');
    btn.textContent = '⏳ 갱신 중...';
    btn.disabled = true;
    try {
      const res = await fetch('/api/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      addMessage('bot', data.message || data.error || '완료');
    } catch (e) {
      addMessage('bot', '⚠️ 갱신 실패');
    }
    btn.textContent = '🔄 문서 갱신';
    btn.disabled = false;
  }
</script>
</body>
</html>
